<!DOCTYPE html>
<html>
<body>
<h1 id='text1'></h1>
<h1> logs: </h1>
<h1 id='text2'></h1>
<script>
window.addEventListener('DOMContentLoaded', () => {
  // 1. Parse the query parameters from the URL
  const urlParams = new URLSearchParams(window.location.search);
  const rawQuery = urlParams.get('search');

  // 2. Target your heading element
  const heading = document.getElementById('text1');

  if (rawQuery) {
    // 3. decodeURIComponent converts %20 to spaces, %21 to exclamation marks, etc.
    heading.textContent = decodeURIComponent(rawQuery);
  } else {
    heading.textContent = "No search term provided";
  }
});
</script>
